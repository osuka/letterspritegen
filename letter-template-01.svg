           height="790.29309"
           x="-329.54871"
           y="-5.785367"
           style="font-family:sans-serif" /></flowRegion><flowPara
         id="flowPara3787"
         style="font-size:16px;line-height:1.25;font-family:sans-serif">1. Create text (bolder fonts look nicer, try Stencil Std or Bauhaus)</flowPara><flowPara
         id="flowPara3789"
         style="font-size:16px;line-height:1.25;font-family:sans-serif">2. Open Fill&amp;Stroke settings</flowPara><flowPara
         id="flowPara3793"
         style="font-size:16px;line-height:1.25;font-family:sans-serif"> </flowPara><flowPara
         id="flowPara3797"
         style="font-size:16px;line-height:1.25;font-family:sans-serif">3. Mark both Fill and Stroke Pain it as unset, which is the &quot;?&quot; icon</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3799"> </flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3801">4. Create three clones</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3803"> </flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3809"> </flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3821">On clone 1:</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3823">Same color of stroke and fill, width 6, it should be just an outline, make it slightly smaller</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3825"> </flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3867">On clone 2:     </flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3871">Same color of stroke and fill, adjust width to 6, add blur and a bit of transparency</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3869" /><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3827">On clone 3:</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3829">make smaller, put it on top of the others</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3877" /><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara3879">Duplicate whole thing. Group the duplicate.</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara5401">Create elipse, select it, select group, object -&gt; clip -&gt; set</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara5462" /><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara5452">Duplicate the text. Group the duplicate. Create elipse, create square and use it to cut elipse in two, keep only bottom part (edit, difference). Click it, select group, object -&gt; clip -&gt; set</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara5444" /><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
         id="flowPara5446">Now you can change the text any time you want.</flowPara><flowPara
         style="font-size:16px;line-height:1.25;font-family:sans-serif"
